spring.application.name=vehicle-rental-system

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Web_Vehicle;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=P@ssw0rd
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Server Configuration
server.port=8081

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Error Handling
server.error.whitelabel.enabled=false
server.error.path=/error

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@driveease.com
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads

# Logging
logging.level.com.vehiclerental=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Payment Gateway Configuration
payment.paypal.client-id=sb-test-client-id
payment.paypal.client-secret=sb-test-client-secret
payment.paypal.mode=sandbox
payment.paypal.base-url=https://api.sandbox.paypal.com

payment.stripe.public-key=pk_test_stripe_public_key
payment.stripe.secret-key=sk_test_stripe_secret_key
payment.stripe.webhook-secret=whsec_test_webhook_secret

payment.gateway.enabled=true
payment.gateway.timeout=30000
payment.gateway.retry-attempts=3
