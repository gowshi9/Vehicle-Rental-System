<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Finance Analytics - DriveEase</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/finance/analytics.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="navbar">
            <a th:href="@{/}" class="navbar-brand">
                <i class="fas fa-car"></i> DriveEase Finance
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/dashboard/finance}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a th:href="@{/finance/dashboard}" class="nav-link"><i class="fas fa-chart-line"></i> Finance</a></li>
                <li><a th:href="@{/finance/analytics}" class="nav-link active"><i class="fas fa-analytics"></i> Analytics</a></li>
            </ul>
        </div>
    </nav>

    <section class="section finance-dashboard">
        <div class="container">
            <div class="section-header">
                <h1><i class="fas fa-chart-bar"></i> Finance Analytics</h1>
                <p>Advanced financial insights and reporting</p>
            </div>

            <div class="finance-stats">
                <div class="stat-card">
                    <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal(totalRevenue ?: 0, 0, 2)}">$0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" th:text="${totalTransactions ?: 0}">0</div>
                    <div class="stat-label">Transactions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal((totalRevenue ?: 0) / (totalTransactions ?: 1), 0, 2)}">$0</div>
                    <div class="stat-label">Avg Transaction</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" th:text="${pendingCount ?: 0}">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="chart-container">
                <h3>Revenue Trend</h3>
                <canvas id="revenueChart" width="400" height="200"></canvas>
            </div>

            <div class="export-buttons">
                <a href="#" class="btn-export">
                    <i class="fas fa-download"></i> Export PDF
                </a>
                <a href="#" class="btn-export">
                    <i class="fas fa-file-excel"></i> Export Excel
                </a>
            </div>
        </div>
    </section>

    <script th:src="@{/finance/analytics.js}"></script>
</body>
</html>
