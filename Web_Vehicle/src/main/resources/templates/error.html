<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - DriveEase</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="navbar">
            <a th:href="@{/}" class="navbar-brand">
                <i class="fas fa-car"></i> DriveEase
            </a>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="error-page">
                <div class="error-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h1>Oops! Something went wrong</h1>
                <p th:text="${error}">An unexpected error occurred</p>
                <div class="error-details" th:if="${message}">
                    <p><strong>Details:</strong> <span th:text="${message}">Error details</span></p>
                </div>
                <div class="error-actions">
                    <a th:href="@{/}" class="btn btn-primary">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <button onclick="history.back()" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </button>
                </div>
            </div>
        </div>
    </section>

    <style>
        .error-page {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .error-icon {
            font-size: 4rem;
            color: var(--warning);
            margin-bottom: 2rem;
        }
        
        .error-page h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .error-details {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius);
            margin: 2rem 0;
            text-align: left;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .error-actions {
                flex-direction: column;
            }
        }
    </style>
</body>
</html>
