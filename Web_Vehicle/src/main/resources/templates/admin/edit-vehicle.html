<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vehicle - DriveEase Admin</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Edit Vehicle</h1>
            <form th:action="@{/admin/vehicles/edit/{id}(id=${vehicle.id})}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}" th:if="${_csrf}"/>
                <div class="form-group">
                    <label class="form-label">License Plate</label>
                    <input type="text" name="licensePlate" class="form-control" th:value="${vehicle.licensePlate}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Make</label>
                    <input type="text" name="make" class="form-control" th:value="${vehicle.make}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Model</label>
                    <input type="text" name="model" class="form-control" th:value="${vehicle.model}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Year</label>
                    <input type="number" name="year" class="form-control" th:value="${vehicle.year}" min="1990" max="2025" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-control" required>
                        <option value="Sedan" th:selected="${vehicle.category == 'Sedan'}">Sedan</option>
                        <option value="SUV" th:selected="${vehicle.category == 'SUV'}">SUV</option>
                        <option value="Hatchback" th:selected="${vehicle.category == 'Hatchback'}">Hatchback</option>
                        <option value="Coupe" th:selected="${vehicle.category == 'Coupe'}">Coupe</option>
                        <option value="Convertible" th:selected="${vehicle.category == 'Convertible'}">Convertible</option>
                        <option value="Truck" th:selected="${vehicle.category == 'Truck'}">Truck</option>
                        <option value="Van" th:selected="${vehicle.category == 'Van'}">Van</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Daily Rate ($)</label>
                    <input type="number" name="dailyRate" class="form-control" th:value="${vehicle.dailyRate}" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control" required>
                        <option value="AVAILABLE" th:selected="${vehicle.status == 'AVAILABLE'}">Available</option>
                        <option value="RENTED" th:selected="${vehicle.status == 'RENTED'}">Rented</option>
                        <option value="MAINTENANCE" th:selected="${vehicle.status == 'MAINTENANCE'}">Maintenance</option>
                        <option value="OUT_OF_SERVICE" th:selected="${vehicle.status == 'OUT_OF_SERVICE'}">Out of Service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <input type="text" name="color" class="form-control" th:value="${vehicle.color}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mileage</label>
                    <input type="number" name="mileage" class="form-control" th:value="${vehicle.mileage}" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Fuel Type</label>
                    <select name="fuelType" class="form-control" required>
                        <option value="Gasoline" th:selected="${vehicle.fuelType == 'Gasoline'}">Gasoline</option>
                        <option value="Diesel" th:selected="${vehicle.fuelType == 'Diesel'}">Diesel</option>
                        <option value="Hybrid" th:selected="${vehicle.fuelType == 'Hybrid'}">Hybrid</option>
                        <option value="Electric" th:selected="${vehicle.fuelType == 'Electric'}">Electric</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Transmission</label>
                    <select name="transmission" class="form-control" required>
                        <option value="Automatic" th:selected="${vehicle.transmission == 'Automatic'}">Automatic</option>
                        <option value="Manual" th:selected="${vehicle.transmission == 'Manual'}">Manual</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Seats</label>
                    <input type="number" name="seats" class="form-control" th:value="${vehicle.seats}" min="2" max="12" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" th:text="${vehicle.description}"></textarea>
                </div>
                
                <!-- PHOTO UPLOAD SECTION -->
                <div class="form-group" style="background: #f0f8ff; padding: 20px; border: 2px dashed #007bff; border-radius: 8px; margin: 20px 0;">
                    <label class="form-label" style="font-weight: bold; color: #007bff;">
                        <i class="fas fa-camera"></i> 📷 Vehicle Photo
                    </label>
                    
                    <!-- Current Photo Display -->
                    <div th:if="${vehicle.photoUrl}" style="margin-bottom: 15px;">
                        <p style="margin: 5px 0; color: #666;">Current Photo:</p>
                        <img th:src="${vehicle.photoUrl}" alt="Current Vehicle Photo" 
                             style="max-width: 200px; max-height: 150px; border: 2px solid #007bff; border-radius: 5px;">
                    </div>
                    <div th:unless="${vehicle.photoUrl}" style="margin-bottom: 15px; color: #666;">
                        <p>No photo currently uploaded</p>
                    </div>
                    
                    <input type="file" id="vehiclePhoto" accept="image/*" class="form-control" style="border: 2px solid #007bff; margin-bottom: 10px;">
                    <small style="color: #666;">Choose a new photo to replace current one (JPG, PNG, GIF)</small>
                    <div id="photoPreview" style="display: none; margin-top: 15px; text-align: center;">
                        <p style="color: #007bff; font-weight: bold;">New Photo Preview:</p>
                        <img id="previewImg" style="max-width: 200px; max-height: 150px; border: 2px solid #28a745; border-radius: 5px;">
                    </div>
                    <input type="hidden" name="photoUrl" id="photoUrl" th:value="${vehicle.photoUrl}">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Update Vehicle</button>
                    <a th:href="@{/admin/vehicles}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('vehiclePhoto').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
                
                // Upload file
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    console.log('Uploading file:', file.name);
                    const response = await fetch('/api/upload/vehicle-photo', {
                        method: 'POST',
                        body: formData
                    });
                    
                    console.log('Response status:', response.status);
                    const result = await response.json();
                    console.log('Response data:', result);
                    
                    if (result.url) {
                        document.getElementById('photoUrl').value = result.url;
                        alert('Photo uploaded successfully!');
                    } else {
                        alert('Failed to upload photo: ' + (result.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    alert('Failed to upload photo: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>
