<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Manage Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Manage Users</h1>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div style="margin-bottom: 1rem;">
                <a th:href="@{/admin/users/new}" class="btn btn-primary">+ Add New User</a>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.username}">admin</td>
                            <td th:text="${user.email}">admin@driveease.com</td>
                            <td>
                                <span th:each="role : ${user.roles}" th:text="${role.name}" class="badge badge-primary">ROLE</span>
                            </td>
                            <td>
                                <span th:class="${user.enabled} ? 'badge badge-success' : 'badge badge-danger'" 
                                      th:text="${user.enabled} ? 'Active' : 'Inactive'">Active</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline">Edit</a>
                                <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display: inline;"
                                      th:unless="${user.username == 'admin' or user.roles.?[name == 'ROLE_ADMIN'].size() > 0}"
                                      onsubmit="return confirm('Are you sure you want to delete this user?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                                <span th:if="${user.username == 'admin' or user.roles.?[name == 'ROLE_ADMIN'].size() > 0}" 
                                      class="badge badge-warning">Protected</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <a th:href="@{/dashboard/admin}" class="btn">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
