<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Manage Vehicles - Admin</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Manage Vehicles</h1>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div style="margin-bottom: 1rem;">
                <a th:href="@{/admin/vehicles/new}" class="btn btn-primary">+ Add New Vehicle</a>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Photo</th>
                            <th>License Plate</th>
                            <th>Make/Model</th>
                            <th>Year</th>
                            <th>Category</th>
                            <th>Daily Rate</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="vehicle : ${vehicles}">
                            <td th:text="${vehicle.id}">1</td>
                            <td>
                                <img th:if="${vehicle.photoUrl}" th:src="${vehicle.photoUrl}" alt="Vehicle Photo" 
                                     style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd;">
                                <div th:unless="${vehicle.photoUrl}" style="width: 80px; height: 60px; background: #f8f9fa; border: 2px dashed #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #6c757d;">
                                    <i class="fas fa-camera"></i>
                                </div>
                            </td>
                            <td th:text="${vehicle.licensePlate}">ABC-123</td>
                            <td th:text="${vehicle.make + ' ' + vehicle.model}">Toyota Camry</td>
                            <td th:text="${vehicle.year}">2023</td>
                            <td th:text="${vehicle.category}">Sedan</td>
                            <td th:text="'$' + ${vehicle.dailyRate}">$50.00</td>
                            <td>
                                <span th:class="${vehicle.status == 'AVAILABLE'} ? 'badge badge-success' : 'badge badge-warning'" 
                                      th:text="${vehicle.status}">Available</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/vehicles/edit/{id}(id=${vehicle.id})}" class="btn btn-sm btn-outline">Edit</a>
                                <form th:action="@{/admin/vehicles/delete/{id}(id=${vehicle.id})}" method="post" style="display: inline;"
                                      onsubmit="return confirm('Are you sure you want to delete this vehicle?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <a th:href="@{/dashboard/admin}" class="btn">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
