<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Contact Messages - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <h6 class="sidebar-heading">Admin Panel</h6>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin/vehicles}">Vehicles</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin/bookings}">Bookings</a></li>
                        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/contact-messages}">Contact Messages</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin/reports}">Reports</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin/analytics}">Analytics</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Contact Messages</h1>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-sm">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="message : ${messages}">
                                <td th:text="${#temporals.format(message.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${message.name}"></td>
                                <td><a th:href="'mailto:' + ${message.email}" th:text="${message.email}"></a></td>
                                <td><a th:href="'tel:' + ${message.phone}" th:text="${message.phone}"></a></td>
                                <td>
                                    <span th:text="${#strings.abbreviate(message.message, 50)}" class="text-truncate"></span>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#messageModal' + ${message.id}">View Full</button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(messages)}">
                                <td colspan="5" class="text-center text-muted">No contact messages found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

                <!-- Message Modals -->
                <div th:each="message : ${messages}" class="modal fade" th:id="'messageModal' + ${message.id}" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Message from <span th:text="${message.name}"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p><strong>Email:</strong> <a th:href="'mailto:' + ${message.email}" th:text="${message.email}"></a></p>
                                <p><strong>Phone:</strong> <a th:href="'tel:' + ${message.phone}" th:text="${message.phone}"></a></p>
                                <p><strong>Date:</strong> <span th:text="${#temporals.format(message.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
                                <hr>
                                <p><strong>Message:</strong></p>
                                <p th:text="${message.message}" class="border p-3 bg-light"></p>
                            </div>
                            <div class="modal-footer">
                                <a th:href="'mailto:' + ${message.email} + '?subject=Re: Your inquiry to DriveEase'" class="btn btn-primary">Reply via Email</a>
                                <button type="button" class="btn btn-success" data-bs-toggle="modal" th:data-bs-target="'#smsModal' + ${message.id}">Send SMS</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SMS Modals -->
                <div th:each="message : ${messages}" class="modal fade" th:id="'smsModal' + ${message.id}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form th:action="@{/admin/contact-messages/sms}" method="post">
                                <div class="modal-header">
                                    <h5 class="modal-title">Send SMS to <span th:text="${message.name}"></span></h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <input type="hidden" name="messageId" th:value="${message.id}">
                                    <p><strong>Phone:</strong> <span th:text="${message.phone}"></span></p>
                                    <div class="mb-3">
                                        <label for="smsMessage" class="form-label">SMS Message:</label>
                                        <textarea name="smsMessage" id="smsMessage" class="form-control" rows="4" maxlength="160" required placeholder="Type your SMS reply here..."></textarea>
                                        <div class="form-text">Maximum 160 characters</div>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="submit" class="btn btn-success">Send SMS</button>
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
