<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard - DriveEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-car"></i> DriveEase System</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/system/users"><i class="fas fa-users"></i> Users</a>
                <a class="nav-link" href="/system/vehicles"><i class="fas fa-car-side"></i> Vehicles</a>
                <a class="nav-link" href="/system/bookings"><i class="fas fa-calendar"></i> Bookings</a>
                <a class="nav-link" href="/system/rentals"><i class="fas fa-handshake"></i> Rentals</a>
                <a class="nav-link" href="/system/payments"><i class="fas fa-credit-card"></i> Payments</a>
                <a class="nav-link" href="/system/analytics"><i class="fas fa-chart-bar"></i> Analytics</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1><i class="fas fa-tachometer-alt"></i> System Dashboard</h1>
        
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5><i class="fas fa-users"></i> Total Users</h5>
                        <h2 th:text="${totalUsers}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5><i class="fas fa-car"></i> Total Vehicles</h5>
                        <h2 th:text="${totalVehicles}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5><i class="fas fa-calendar"></i> Total Bookings</h5>
                        <h2 th:text="${totalBookings}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5><i class="fas fa-handshake"></i> Total Rentals</h5>
                        <h2 th:text="${totalRentals}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cogs"></i> Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-2">
                                <a href="/system/users" class="btn btn-primary w-100 mb-2">
                                    <i class="fas fa-users"></i><br>Manage Users
                                </a>
                            </div>
                            <div class="col-md-2">
                                <a href="/system/vehicles" class="btn btn-success w-100 mb-2">
                                    <i class="fas fa-car"></i><br>Manage Vehicles
                                </a>
                            </div>
                            <div class="col-md-2">
                                <a href="/system/bookings" class="btn btn-warning w-100 mb-2">
                                    <i class="fas fa-calendar"></i><br>Manage Bookings
                                </a>
                            </div>
                            <div class="col-md-2">
                                <a href="/system/rentals" class="btn btn-info w-100 mb-2">
                                    <i class="fas fa-handshake"></i><br>Manage Rentals
                                </a>
                            </div>
                            <div class="col-md-2">
                                <a href="/system/payments" class="btn btn-secondary w-100 mb-2">
                                    <i class="fas fa-credit-card"></i><br>View Payments
                                </a>
                            </div>
                            <div class="col-md-2">
                                <a href="/system/analytics" class="btn btn-dark w-100 mb-2">
                                    <i class="fas fa-chart-bar"></i><br>View Analytics
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/system.js"></script>
    <div class="mt-4">
        <button class="btn btn-info" data-action="test-connection">
            <i class="fas fa-database"></i> Test Database Connection
        </button>
    </div>
</body>
</html>
