<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Management - DriveEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/system/dashboard"><i class="fas fa-car"></i> DriveEase System</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1><i class="fas fa-credit-card"></i> Payment Management</h1>

        <div class="card mt-4">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Booking ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="payment : ${payments}">
                                <td th:text="${payment.id}"></td>
                                <td th:text="${payment.booking?.id}"></td>
                                <td th:text="${payment.booking?.user?.firstName + ' ' + payment.booking?.user?.lastName}"></td>
                                <td th:text="'$' + ${payment.amount}"></td>
                                <td th:text="${payment.paymentMethod}"></td>
                                <td>
                                    <span th:class="${'badge bg-' + (payment.status == 'COMPLETED' ? 'success' : (payment.status == 'PENDING' ? 'warning' : (payment.status == 'FAILED' ? 'danger' : 'secondary')))}"
                                          th:text="${payment.status}"></span>
                                </td>
                                <td th:text="${payment.paymentDate}"></td>
                                <td>
                                    <button class="btn btn-sm btn-info" th:onclick="|viewPayment(${payment.id})|">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-sm btn-success" th:onclick="|refundPayment(${payment.id})|"
                                            th:if="${payment.status == 'COMPLETED'}">
                                        <i class="fas fa-undo"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/system.js"></script>
</body>
</html>
