<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rental Management - DriveEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/system/dashboard"><i class="fas fa-car"></i> DriveEase System</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1><i class="fas fa-handshake"></i> Rental Management</h1>

        <div class="card mt-4">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Customer</th>
                                <th>Vehicle</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Status</th>
                                <th>Total Cost</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rental : ${rentals}">
                                <td th:text="${rental.id}"></td>
                                <td th:text="${rental.customer?.firstName + ' ' + rental.customer?.lastName}"></td>
                                <td th:text="${rental.vehicle?.make + ' ' + rental.vehicle?.model}"></td>
                                <td th:text="${rental.startDate}"></td>
                                <td th:text="${rental.endDate}"></td>
                                <td>
                                    <span th:class="${'badge bg-' + (rental.status == 'ACTIVE' ? 'success' : (rental.status == 'COMPLETED' ? 'primary' : (rental.status == 'CANCELLED' ? 'danger' : 'secondary')))}"
                                          th:text="${rental.status}"></span>
                                </td>
                                <td th:text="'$' + ${rental.totalCost}"></td>
                                <td>
                                    <button class="btn btn-sm btn-info" th:onclick="|viewRental(${rental.id})|">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-sm btn-warning" th:onclick="|updateStatus(${rental.id})|">
                                        <i class="fas fa-sync"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/system.js"></script>
</body>
</html>
