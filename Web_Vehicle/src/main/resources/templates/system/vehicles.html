<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Management - DriveEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/system/dashboard"><i class="fas fa-car"></i> DriveEase System</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-car"></i> Vehicle Management</h1>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
                <i class="fas fa-plus"></i> Add Vehicle
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Make</th>
                                <th>Model</th>
                                <th>Year</th>
                                <th>License Plate</th>
                                <th>Price/Day</th>
                                <th>Photo</th>
                                <th>Available</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="vehicle : ${vehicles}">
                                <td th:text="${vehicle.id}"></td>
                                <td th:text="${vehicle.make}"></td>
                                <td th:text="${vehicle.model}"></td>
                                <td th:text="${vehicle.year}"></td>
                                <td th:text="${vehicle.licensePlate}"></td>
                                <td th:text="'$' + ${vehicle.pricePerDay}"></td>
                                <td>
                                    <img th:if="${vehicle.photoUrl}" th:src="${vehicle.photoUrl}" alt="Vehicle Photo" 
                                         style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;">
                                    <span th:unless="${vehicle.photoUrl}" class="text-muted">No Photo</span>
                                </td>
                                <td>
                                    <span th:if="${vehicle.status == 'AVAILABLE'}" class="badge bg-success">Available</span>
                                    <span th:unless="${vehicle.status == 'AVAILABLE'}" class="badge bg-danger">Unavailable</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-primary" onclick="editVehicle([[${vehicle.id}]])">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteVehicle([[${vehicle.id}]])">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal fade" id="addVehicleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Vehicle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                    <form id="addVehicleForm">
                        <!-- PHOTO UPLOAD SECTION - MOVED TO TOP -->
                        <div class="alert alert-primary mb-4">
                            <h5 class="alert-heading"><i class="fas fa-camera"></i> 📷 VEHICLE PHOTO</h5>
                            <input type="file" class="form-control mb-2" id="vehiclePhoto" accept="image/*" style="border: 3px solid #0d6efd;">
                            <small>Choose a photo from your device</small>
                            <div id="photoPreview" style="display: none; margin-top: 10px;">
                                <img id="previewImg" style="max-width: 200px; border: 2px solid #0d6efd; border-radius: 5px;">
                            </div>
                            <input type="hidden" name="photoUrl" id="photoUrl">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">License Plate</label>
                                    <input type="text" class="form-control" name="licensePlate" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Make</label>
                                    <input type="text" class="form-control" name="make" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Model</label>
                                    <input type="text" class="form-control" name="model" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Year</label>
                                    <input type="number" class="form-control" name="year" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Category</label>
                                    <select class="form-control" name="category" required>
                                        <option value="">Select Category</option>
                                        <option value="ECONOMY">Economy</option>
                                        <option value="COMPACT">Compact</option>
                                        <option value="MIDSIZE">Midsize</option>
                                        <option value="FULLSIZE">Full Size</option>
                                        <option value="SUV">SUV</option>
                                        <option value="LUXURY">Luxury</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Daily Rate ($)</label>
                                    <input type="number" step="0.01" class="form-control" name="pricePerDay" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Color</label>
                                    <input type="text" class="form-control" name="color">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mileage</label>
                                    <input type="number" class="form-control" name="mileage">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fuel Type</label>
                                    <select class="form-control" name="fuelType">
                                        <option value="Gasoline">Gasoline</option>
                                        <option value="Diesel">Diesel</option>
                                        <option value="Electric">Electric</option>
                                        <option value="Hybrid">Hybrid</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Transmission</label>
                                    <select class="form-control" name="transmission">
                                        <option value="Automatic">Automatic</option>
                                        <option value="Manual">Manual</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Seats</label>
                                    <input type="number" class="form-control" name="seats" min="2" max="8">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="available" checked>
                                <label class="form-check-label">Available</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveVehicle()">Save Vehicle</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/system.js"></script>
</body>
</html>
