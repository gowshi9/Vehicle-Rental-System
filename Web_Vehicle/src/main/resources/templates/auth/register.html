<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <title th:text="${title}">Register - DriveEase</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 500px; margin: 2rem auto; padding: 2rem;">
        <div class="card">
            <div class="text-center mb-3">
                <h1>DriveEase</h1>
                <h2>Create Account</h2>
                <p>Join DriveEase and start your journey</p>
            </div>

            <form th:action="@{/auth/register}" method="post" th:object="${user}" id="registrationForm">
                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" th:if="${_csrf}"/>
                <div class="form-group">
                    <label for="username" class="form-label">Username *</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required>
                    <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number * (10 digits)</label>
                    <input type="tel" id="phone" th:field="*{phone}" class="form-control" placeholder="1234567890" required>
                    <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password *</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></div>
                    <small style="color: var(--muted);">Must be at least 8 characters with uppercase, number, and symbol</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password *</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required>
                    <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error"></div>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Create Account</button>
            </form>

            <div class="text-center mt-3">
                <p>Already have an account? <a th:href="@{/login}">Sign in here</a></p>
                <p><a th:href="@{/}">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        // Additional validation for password confirmation
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                VehicleRental.showError(document.getElementById('confirmPassword'), 'Passwords do not match');
                VehicleRental.showToast('Passwords do not match', 'error');
            }
        });
    </script>
</body>
</html>
